<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ALM GeoFreq v6 — File → Image → File</title>

  <!-- مكتبات محلية -->
  <script src="jszip.min.js"></script>
  <script src="pdf.min.js"></script>
  <script src="pdf.worker.min.js"></script>
  <script src="jspdf.umd.min.js"></script>
  <script src="docx.min.js"></script>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0BA37F">

  <style>
    :root{
      --green:#0BA37F;
      --green2:#0a8c6c;
      --bg:#f6f8fb;
      --card:#fff;
      --text:#18202a;
      --muted:#6b7280;
      --border:#e5e7eb;
    }
    body { font-family: "Cairo", system-ui; margin:0; background:var(--bg); color:var(--text); }
    header { background:linear-gradient(90deg,var(--green),#0b8fc1); color:white; padding:18px; text-align:center; font-weight:800; }

    .container { padding:20px; max-width:980px; margin:auto; }

    .grid{
      display:grid;
      grid-template-columns: 1fr;
      gap:14px;
    }
    @media (min-width: 900px){
      .grid{ grid-template-columns: 1fr 1fr; }
      .span2{ grid-column: 1 / -1; }
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:14px;
      padding:16px;
    }

    label{ display:block; font-weight:700; margin-top:10px; }

    input[type="text"], select{
      width:100%; padding:12px;
      margin-top:8px;
      border:1px solid var(--border);
      border-radius:10px;
    }

    input[type="file"]{ width:100%; margin-top:10px; }

    button{
      width:100%;
      padding:12px;
      margin-top:10px;
      background:var(--green);
      color:#fff;
      border:none;
      border-radius:10px;
      font-weight:800;
      cursor:pointer;
    }
    button:hover{ background:var(--green2); }

    button.secondary{
      background:#111827;
    }

    .row{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    .status{
      margin-top:10px;
      padding:10px;
      border:1px solid var(--border);
      border-radius:10px;
      background:#fff;
      color:var(--muted);
    }

    #canvas{
      width:100%;
      max-width:520px;
      image-rendering: pixelated;
      border:1px solid var(--border);
      border-radius:12px;
      margin-top:10px;
    }

    #outputText{
      margin-top:10px;
      border:1px solid var(--border);
      border-radius:10px;
      padding:12px;
      min-height:120px;
      background:#fff;
    }

    .pill{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      background:#ecfdf5;
      border:1px solid #bbf7d0;
      color:#065f46;
      font-weight:800;
      font-size:12px;
    }

    footer{
      text-align:center;
      padding:20px;
      color:#666;
    }
  </style>
</head>

<body>
<header>ALM GeoFreq v6 — File → Image → File</header>

<div class="container">
  <div class="grid">

    <!-- ENCODE -->
    <div class="card">
      <span class="pill">ترميز</span>

      <label for="userKey">مفتاح المستخدم</label>
      <input id="userKey" type="text" value="123456789" />

      <label>وضع الترميز</label>
      <select id="mode">
        <option value="v1">دقيق (V1)</option>
        <option value="v2">مقاوم (V2)</option>
      </select>

      <small>
        V1: دقة عالية (يتأثر بالضغط)<br>
        V2: مقاوم جزئيًا للتشويه
      </small>

      <h3>1) اختيار ملف Word أو PDF → صورة</h3>

      <input type="file" id="docInput" accept=".docx,.pdf" />
      <button id="btnEncode">تحويل إلى صورة</button>

      <canvas id="canvas"></canvas>
      <button class="secondary" id="btnSaveImage">💾 حفظ الصورة</button>

      <div class="status" id="statusEncode">جاهز.</div>
    </div>

    <!-- DECODE -->
    <div class="card">
      <span class="pill" style="background:#eff6ff;border-color:#bfdbfe;color:#1d4ed8;">فكّ</span>

      <h3>2) اختيار صورة PNG → استرجاع</h3>

      <input type="file" id="imageInput" accept="image/png" />
      <button id="btnDecode">استعادة النص</button>

      <label>نوع الإخراج</label>
      <select id="exportMode">
        <option value="word">Word</option>
        <option value="pdf">PDF</option>
      </select>

      <button class="secondary" id="btnExport">تنزيل الملف</button>

      <div id="outputText">—</div>
      <div class="status" id="statusDecode">انتظر...</div>
    </div>

    <div class="card span2">
      <small>
        النظام يعتمد على ALM + CRC.  
        لا ترسل الصورة عبر واتساب كصورة — أرسلها كملف.
      </small>
    </div>

  </div>
</div>

<script src="script.js"></script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

<footer>
تم التطوير بواسطة رأفت عمر — 
</footer>

</body>
</html>
